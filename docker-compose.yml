version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/storage/migrations:/docker-entrypoint-initdb.d
  agent:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://agent:agent_secret@postgres:5432/research_agent
    env_file: .env
volumes:
  pgdata:
